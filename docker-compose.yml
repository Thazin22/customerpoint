services:
  db:
    image: postgres:16-alpine
    container_name: customer_loyalty_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loyalty_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .:/app:ro

volumes:
  postgres_data:

